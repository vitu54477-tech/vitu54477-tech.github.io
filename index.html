<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>BergTips - Jogos do Dia</title>
<style>
body { font-family: Arial; background: #121212; color: #fff; margin:0; padding:20px; }
h2 { text-align:center; color:#0099ff; }
.card { background: #1e1e1e; padding: 15px; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
.card b { color: #ffcc00; }
.card .palpite { color:#00ff88; font-weight:bold; font-size: 16px; }
footer { margin-top: 20px; font-size: 14px; text-align:center; color:#aaa; }
footer a { color: #0099ff; text-decoration: none; margin: 0 10px; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVXOYYomSjZoUuhQ7DBQqjwAv35qZTfSA",
  authDomain: "berg-b81b6.firebaseapp.com",
  projectId: "berg-b81b6",
  storageBucket: "berg-b81b6.firebasestorage.app",
  messagingSenderId: "370724091586",
  appId: "1:370724091586:web:ee05b1e3bc612d3cc72d5b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function mostrarJogos() {
    const lista = document.getElementById("lista");
    const q = query(collection(db, "jogos"), orderBy("timestamp", "desc"));
    onSnapshot(q, snapshot => {
        lista.innerHTML = "";
        snapshot.forEach(docSnap => {
            const jogo = docSnap.data();
            lista.innerHTML += `
            <div class="card">
                <b>${jogo.campeonato}</b><br>
                ${jogo.time1} vs ${jogo.time2}<br>
                ⏰ ${jogo.horario}<br>
                💡 Palpite: <span class="palpite">${jogo.palpite}</span>
            </div>`;
        });
    });
}

window.onload = mostrarJogos;
</script>
</head>
<body>
<h2>📋 Jogos do Dia - BergTips</h2>
<div id="lista"></div>

<footer>

</body>
</html>
