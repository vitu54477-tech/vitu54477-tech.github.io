<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin - BergTips</title>
<style>
body { font-family: Arial; padding: 20px; background: #121212; color: #fff; }
h2 { color: #0099ff; }
input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border:none; background:#1e1e1e; color:#fff; }
button { width: 100%; padding: 12px; background: #0099ff; color: white; font-size: 16px; border: none; border-radius: 5px; margin-bottom: 10px; cursor:pointer; }
#painel { display: none; }
.jogo-card { background: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 10px; box-shadow:0 2px 5px rgba(0,0,0,0.4);}
.jogo-card button { background: red; margin-top: 5px; width: 100%; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVXOYYomSjZoUuhQ7DBQqjwAv35qZTfSA",
  authDomain: "berg-b81b6.firebaseapp.com",
  projectId: "berg-b81b6",
  storageBucket: "berg-b81b6.firebasestorage.app",
  messagingSenderId: "370724091586",
  appId: "1:370724091586:web:ee05b1e3bc612d3cc72d5b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = function(){
    const s = document.getElementById("senha").value;
    if(s==="0000") {
        document.getElementById("painel").style.display="block";
        carregarJogos();
    } else {
        alert("Senha incorreta");
    }
}

async function carregarJogos(){
    const lista = document.getElementById("lista-jogos");
    lista.innerHTML = "";
    const q = collection(db, "jogos");
    onSnapshot(q, snapshot => {
        lista.innerHTML = "";
        snapshot.forEach(docSnap => {
            const jogo = docSnap.data();
            const id = docSnap.id;
            lista.innerHTML += `
            <div class="jogo-card">
                <b>${jogo.campeonato}</b><br>
                ${jogo.time1} vs ${jogo.time2}<br>
                ⏰ ${jogo.horario}<br>
                💡 Palpite: <span style="color:#00ff88;font-weight:bold;">${jogo.palpite}</span><br>
                <button onclick="apagarJogo('${id}')">Apagar</button>
            </div>`;
        });
    });
}

window.salvarJogo = async function(){
    const campeonato = document.getElementById("camp").value;
    const time1 = document.getElementById("t1").value;
    const time2 = document.getElementById("t2").value;
    const horario = document.getElementById("hora").value;
    const palpite = document.getElementById("palpite").value;

    if(!campeonato || !time1 || !time2 || !horario || !palpite){
      alert("Preencha todos os campos!");
      return;
    }

    try {
      await addDoc(collection(db, "jogos"), {
        campeonato, time1, time2, horario, palpite, timestamp: serverTimestamp()
      });
      alert("Jogo adicionado!");
      document.getElementById("camp").value="";
      document.getElementById("t1").value="";
      document.getElementById("t2").value="";
      document.getElementById("hora").value="";
      document.getElementById("palpite").value="";
    } catch(e){
      alert("Erro ao salvar: " + e);
    }
}

window.apagarJogo = async function(id){
    if(confirm("Deseja realmente apagar este jogo?")){
        await deleteDoc(doc(db, "jogos", id));
        alert("Jogo apagado!");
    }
}
</script>
</head>

<body>
<h2>🔐 Login do Admin</h2>
<input id="senha" type="password" placeholder="Digite a senha">
<button onclick="login()">Entrar</button>

<div id="painel">
    <h2>Painel Admin</h2>
    <input id="camp" placeholder="Campeonato">
    <input id="t1" placeholder="Time 1">
    <input id="t2" placeholder="Time 2">
    <input id="hora" placeholder="Horário">
    <input id="palpite" placeholder="Palpite">
    <button onclick="salvarJogo()">Salvar Jogo</button>
    
    <h3>Jogos cadastrados</h3>
    <div id="lista-jogos"></div>
</div>
</body>
</html>
