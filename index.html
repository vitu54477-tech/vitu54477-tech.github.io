<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>BergTips - Jogos do Dia</title>
<style>
body { font-family: Arial; background: #f4f4f4; padding: 20px; }
.card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVXOYYomSjZoUuhQ7DBQqjwAv35qZTfSA",
  authDomain: "berg-b81b6.firebaseapp.com",
  projectId: "berg-b81b6",
  storageBucket: "berg-b81b6.firebasestorage.app",
  messagingSenderId: "370724091586",
  appId: "1:370724091586:web:ee05b1e3bc612d3cc72d5b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function carregarJogos(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";
  const q = query(collection(db, "jogos"), orderBy("timestamp","desc"));
  const snapshot = await getDocs(q);
  snapshot.forEach(doc=>{
    const jogo = doc.data();
    lista.innerHTML += `
      <div class="card">
        <b>${jogo.campeonato}</b><br>
        ${jogo.time1} vs ${jogo.time2}<br>
        ⏰ ${jogo.horario}<br>
        💡 Palpite: <b>${jogo.palpite}</b>
      </div>
    `;
  });
}

window.onload = carregarJogos;
</script>
</head>

<body>
<h2>📋 Jogos do Dia</h2>
<div id="lista"></div>
</body>
</html>
